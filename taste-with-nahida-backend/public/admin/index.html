<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Taste with Nahida</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view" class="login-wrap">
  <form id="login-form" class="login-card">
    <h1>Taste with Nahida</h1>
    <p class="sub">Admin Dashboard</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit" class="btn">Log In</button>
    <p id="login-error" class="error"></p>
  </form>
</div>

<!-- DASHBOARD VIEW -->
<div id="app-view" class="app-wrap" style="display:none;">
  <aside class="sidebar">
    <h2>🍛 Taste with Nahida</h2>
    <nav>
      <button class="nav-btn active" data-tab="recipes">🍛 Recipes</button>
      <button class="nav-btn" data-tab="reviews">🍽 Reviews</button>
      <button class="nav-btn" data-tab="blog">✈️ Travel Blog</button>
      <button class="nav-btn" data-tab="gallery">📸 Gallery</button>
      <button class="nav-btn" data-tab="messages">📞 Messages</button>
      <button class="nav-btn" data-tab="subscribers">📧 Subscribers</button>
      <button class="nav-btn" data-tab="business">💰 Business</button>
    </nav>
    <button id="logout-btn" class="btn-outline">Log Out</button>
  </aside>

  <main class="content">
    <div id="tab-recipes" class="tab"></div>
    <div id="tab-reviews" class="tab" style="display:none;"></div>
    <div id="tab-blog" class="tab" style="display:none;"></div>
    <div id="tab-gallery" class="tab" style="display:none;"></div>
    <div id="tab-messages" class="tab" style="display:none;"></div>
    <div id="tab-subscribers" class="tab" style="display:none;"></div>
    <div id="tab-business" class="tab" style="display:none;"></div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
